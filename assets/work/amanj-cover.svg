<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="am-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="am-flow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#am-bg)"/>
  <circle cx="640" cy="80" r="120" fill="#6366f1" opacity="0.12"/>
  <circle cx="120" cy="380" r="100" fill="#a78bfa" opacity="0.1"/>
  <!-- Flowing collaboration curves -->
  <path d="M80 220 Q200 120 360 200 T640 180 T760 280" fill="none" stroke="url(#am-flow)" stroke-width="3" opacity="0.7"/>
  <path d="M100 280 Q240 200 400 260 T720 240" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.35"/>
  <path d="M140 320 Q280 260 440 300 T680 290" fill="none" stroke="#818cf8" stroke-width="1.2" opacity="0.25"/>
  <!-- Nodes -->
  <circle cx="200" cy="200" r="8" fill="#c4b5fd" opacity="0.85"/>
  <circle cx="400" cy="248" r="10" fill="#e0e7ff" opacity="0.9"/>
  <circle cx="560" cy="188" r="8" fill="#a78bfa" opacity="0.8"/>
  <rect x="330" y="160" width="140" height="88" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(196,181,253,0.35)" stroke-width="1"/>
</svg>
