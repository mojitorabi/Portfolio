<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0E2A"/>
      <stop offset="100%" stop-color="#1A1640"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4B3F9E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4A84B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4B3F9E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Background glows -->
  <circle cx="200" cy="350" r="180" fill="#2D2680" opacity="0.2"/>
  <circle cx="620" cy="100" r="160" fill="#4B3F9E" opacity="0.15"/>
  <!-- Growth chart line -->
  <polyline points="120,340 220,290 320,260 410,220 490,175 580,130 680,90" stroke="url(#wave)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gold coins / circles -->
  <circle cx="400" cy="220" r="34" fill="url(#gold)" opacity="0.9"/>
  <circle cx="400" cy="220" r="26" fill="none" stroke="#E8C566" stroke-width="3" opacity="0.6"/>
  <circle cx="310" cy="260" r="26" fill="url(#gold)" opacity="0.7"/>
  <circle cx="310" cy="260" r="20" fill="none" stroke="#E8C566" stroke-width="2" opacity="0.5"/>
  <circle cx="490" cy="175" r="22" fill="url(#gold)" opacity="0.8"/>
  <circle cx="580" cy="130" r="18" fill="url(#gold)" opacity="0.6"/>
  <!-- Area fill under chart -->
  <path d="M 120,340 220,290 320,260 410,220 490,175 580,130 680,90 680,420 120,420 Z" fill="#D4A84B" opacity="0.04"/>
  <!-- Subtle horizontal rules like a chart -->
  <line x1="80" y1="130" x2="720" y2="130" stroke="#4B3F9E" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="220" x2="720" y2="220" stroke="#4B3F9E" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="310" x2="720" y2="310" stroke="#4B3F9E" stroke-width="0.5" opacity="0.5"/>
  <!-- Sparkle / stars -->
  <circle cx="490" cy="175" r="4" fill="#E8C566" opacity="0.9"/>
  <circle cx="580" cy="130" r="3" fill="#E8C566" opacity="0.8"/>
  <circle cx="260" cy="60" r="2" fill="#E8C566" opacity="0.5"/>
  <circle cx="700" cy="250" r="2" fill="#E8C566" opacity="0.4"/>
</svg>
