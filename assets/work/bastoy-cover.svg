<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D4A3E"/>
      <stop offset="100%" stop-color="#1A2E26"/>
    </linearGradient>
    <linearGradient id="shape1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8A72" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3D6B56" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="shape2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8D5B0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#D4C49A" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Abstract circles -->
  <circle cx="600" cy="120" r="160" fill="url(#shape1)" opacity="0.35"/>
  <circle cx="150" cy="380" r="200" fill="#4A7A62" opacity="0.2"/>
  <!-- Human silhouettes -->
  <ellipse cx="320" cy="195" rx="28" ry="28" fill="url(#shape2)" opacity="0.9"/>
  <rect x="296" y="220" width="48" height="70" rx="12" fill="url(#shape2)" opacity="0.9"/>
  <ellipse cx="420" cy="200" rx="24" ry="24" fill="#E8D5B0" opacity="0.7"/>
  <rect x="398" y="222" width="44" height="65" rx="10" fill="#E8D5B0" opacity="0.7"/>
  <ellipse cx="220" cy="205" rx="22" ry="22" fill="#7FB99A" opacity="0.8"/>
  <rect x="200" y="225" width="40" height="60" rx="10" fill="#7FB99A" opacity="0.8"/>
  <!-- Connecting line (community/connection) -->
  <path d="M 220 255 Q 270 240 320 265 Q 370 278 420 260" stroke="#E8D5B0" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="6,4"/>
  <!-- Accent dot cluster -->
  <circle cx="530" cy="300" r="6" fill="#7FB99A" opacity="0.7"/>
  <circle cx="548" cy="288" r="4" fill="#E8D5B0" opacity="0.5"/>
  <circle cx="562" cy="310" r="5" fill="#5A8A72" opacity="0.6"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#5A8A72" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#5A8A72" stroke-width="0.5" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="#5A8A72" stroke-width="0.5" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="#5A8A72" stroke-width="0.5" opacity="0.1"/>
</svg>
