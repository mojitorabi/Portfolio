<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1B20"/>
      <stop offset="100%" stop-color="#162029"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2EC4B6"/>
      <stop offset="100%" stop-color="#1A9E92"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="600" cy="100" r="200" fill="#1E3A40" opacity="0.3"/>
  <!-- Whiteboard / teaching abstraction -->
  <rect x="180" y="110" width="320" height="220" rx="10" fill="#131F28" stroke="#2EC4B6" stroke-width="1.5" opacity="0.9"/>
  <!-- Diagram on board -->
  <circle cx="277" cy="185" r="28" fill="none" stroke="#2EC4B6" stroke-width="2" opacity="0.9"/>
  <circle cx="375" cy="185" r="28" fill="none" stroke="#2EC4B6" stroke-width="2" opacity="0.7"/>
  <line x1="305" y1="185" x2="347" y2="185" stroke="#2EC4B6" stroke-width="1.5" opacity="0.7"/>
  <line x1="277" y1="213" x2="250" y2="260" stroke="#2EC4B6" stroke-width="1.5" opacity="0.5"/>
  <line x1="375" y1="213" x2="400" y2="260" stroke="#2EC4B6" stroke-width="1.5" opacity="0.5"/>
  <circle cx="250" cy="270" r="20" fill="none" stroke="#2EC4B6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="400" cy="270" r="20" fill="none" stroke="#2EC4B6" stroke-width="1.5" opacity="0.6"/>
  <!-- Text lines on board -->
  <rect x="200" y="140" width="80" height="8" rx="2" fill="#2EC4B6" opacity="0.4"/>
  <rect x="200" y="310" width="260" height="5" rx="2" fill="#2EC4B6" opacity="0.2"/>
  <!-- Students represented as dots -->
  <circle cx="580" cy="250" r="16" fill="#1E3A40" stroke="#2EC4B6" stroke-width="1.5" opacity="0.8"/>
  <circle cx="620" cy="270" r="16" fill="#1E3A40" stroke="#2EC4B6" stroke-width="1.5" opacity="0.7"/>
  <circle cx="560" cy="290" r="16" fill="#1E3A40" stroke="#2EC4B6" stroke-width="1.5" opacity="0.6"/>
  <!-- Year spanning bar -->
  <rect x="180" y="370" width="320" height="4" rx="2" fill="#2EC4B6" opacity="0.25"/>
  <rect x="180" y="370" width="180" height="4" rx="2" fill="#2EC4B6" opacity="0.7"/>
  <text x="192" y="396" fill="#2EC4B6" font-size="10" font-family="sans-serif" opacity="0.6">2018</text>
  <text x="472" y="396" fill="#2EC4B6" font-size="10" font-family="sans-serif" opacity="0.6">2022</text>
</svg>
