  <circle cx="190" cy="305" r="8" fill="#9B59B6" opacity="0.6"/>
  <circle cx="270" cy="305" r="8" fill="#7D3C98" opacity="0.7"/>
  <circle cx="350" cy="305" r="8" fill="#9B59B6" opacity="0.5"/>
  <!-- Subtle dots pattern -->
