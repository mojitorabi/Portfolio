<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0F2030"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#1E3A5F" opacity="0.6"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>
  <circle cx="400" cy="225" r="250" fill="#1A3A60" opacity="0.2"/>
  <!-- Design system grid visual -->
  <rect x="180" y="120" width="180" height="120" rx="12" fill="#1A2E4A" stroke="#2A4A6E" stroke-width="1.5"/>
  <rect x="200" y="140" width="60" height="14" rx="3" fill="#FF6B47" opacity="0.8"/>
  <rect x="200" y="162" width="140" height="8" rx="2" fill="#3A5A7A" opacity="0.7"/>
  <rect x="200" y="176" width="110" height="8" rx="2" fill="#3A5A7A" opacity="0.5"/>
  <rect x="200" y="198" width="50" height="26" rx="5" fill="#FF6B47" opacity="0.6"/>
  <rect x="260" y="198" width="70" height="26" rx="5" fill="#2A4A6E" stroke="#3A5A7A" stroke-width="1"/>
  <!-- Dark mode toggle mockup -->
  <rect x="440" y="120" width="180" height="120" rx="12" fill="#0A0E1A" stroke="#2A4A6E" stroke-width="1.5"/>
  <rect x="460" y="140" width="60" height="14" rx="3" fill="#FF6B47" opacity="0.8"/>
  <rect x="460" y="162" width="140" height="8" rx="2" fill="#3A5A7A" opacity="0.7"/>
  <rect x="460" y="176" width="110" height="8" rx="2" fill="#3A5A7A" opacity="0.5"/>
  <rect x="460" y="198" width="50" height="26" rx="5" fill="#FF6B47" opacity="0.6"/>
  <!-- Connection arrow -->
  <path d="M 362 180 L 438 180" stroke="#FF6B47" stroke-width="1.5" opacity="0.7" marker-end="url(#arrow)"/>
  <!-- User count accent -->
  <circle cx="400" cy="340" r="40" fill="#1E3A5F" opacity="0.5"/>
  <text x="400" y="336" text-anchor="middle" fill="#FF6B47" font-size="16" font-family="sans-serif" font-weight="bold" opacity="0.9">30M+</text>
  <text x="400" y="354" text-anchor="middle" fill="#7A9AB5" font-size="9" font-family="sans-serif" opacity="0.7">users</text>
</svg>
